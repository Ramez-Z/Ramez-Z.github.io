<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>

    </header>
    
    <main>
        <section class="bokabord-section">
            <div class="container m-5 p-3 col-lg-8 col-sm-12 mx-auto" style="border: 2px solid green; min-height: fit-content; max-height: 75%; border-radius: 15px;">
                <h1 class="text-center mb-3"><i class="fa-solid fa-calendar-check me-2"></i>Boka Bord</h1>
                <div style="min-height: auto;border: 2px solid green; border-radius: 15px;" class="d-flex p-3 menu-container ">
                    <form class="col-lg-8 col-sm-12 mx-auto">
                        <div class="mb-3">
                            <label for="name" class="form-label">Namn</label>
                            <input type="text" class="form-control" id="name" placeholder="Ditt namn" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-post</label>
                            <input type="email" class="form-control" id="email" placeholder="Din e-postadress" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Telefonnummer (frivilligt)</label>
                            <input type="tel" class="form-control" id="phone" placeholder="Ditt telefonnummer">
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Datum och Tid</label>
                            <input type="datetime-local" class="form-control" id="date">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Boka Nu</button>
                    </form>
                </div>
            </div>
        </section>

        <footer>
            
        </footer>
</body>
<script src="init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
